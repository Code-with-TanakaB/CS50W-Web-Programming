<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            //By default, submit button is disabled until user types something in the input
            document.querySelector("button").disabled = true;
            document.querySelector("#task-input").onkeyup = function() {
                document.querySelector("button").disabled = this.value.trim() === "";
            };

            document.querySelector("form").onsubmit = () => {
                const taskList = document.querySelector("ul");
                const taskInput = document.querySelector("#task-input");

                const taskText = taskInput.value.trim();
                if (taskText !== "") {
                    const newTask = document.createElement("li");
                    newTask.textContent = taskText;
                    taskList.appendChild(newTask);
                    taskInput.value = "";
                    document.querySelector("button").disabled = true; // Disable button after adding a task
                }
                return false; // Prevent form submission
            };
        });
     </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h1>Tasks</h1>
    <ul>
        <form>
            <input type="text" placeholder="Add a new task..." id="task-input">
            <button type="submit" class="btn btn-primary">Add</button>
        </form>
    </ul>
</body>
</html>
