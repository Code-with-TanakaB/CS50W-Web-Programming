<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animate</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            width: 100vw;
            height: 100vh;
        }

        h1 {
            position: absolute;
            color: white;
            font-family: sans-serif;
            font-size: 3rem;
            margin: 0;
            user-select: none;
        }
    </style>
</head>
<body>
    <h1 id="logo">Rose ❤️</h1>

    <script>
        const logo = document.getElementById('logo');

        let x = 0;
        let y = 0;
        let dx = 2;
        let dy = 2;

        const colors = ['red', 'blue', 'green', 'orange', 'purple', 'cyan', 'magenta', 'yellow'];
        let colorIndex = 0;

        function animate() {
            const W = window.innerWidth;
            const H = window.innerHeight;
            const logoW = logo.offsetWidth;
            const logoH = logo.offsetHeight;

            x += dx;
            y += dy;

            let bounced = false;

            if (x + logoW >= W) {
                x = W - logoW;
                dx = -dx;
                bounced = true;
            } else if (x <= 0) {
                x = 0;
                dx = -dx;
                bounced = true;
            }

            if (y + logoH >= H) {
                y = H - logoH;
                dy = -dy;
                bounced = true;
            } else if (y <= 0) {
                y = 0;
                dy = -dy;
                bounced = true;
            }

            if (bounced) {
                colorIndex = (colorIndex + 1) % colors.length;
                logo.style.color = colors[colorIndex];
            }

            logo.style.left = x + 'px';
            logo.style.top = y + 'px';

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
