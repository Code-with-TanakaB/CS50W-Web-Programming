{% extends "flights/layout.html" %}

{% block body %}
    <div class="container">
        <h1>Flights</h1>
        <ul>
            {% for flight in flights %}
                <li>
                    <a href="{% url 'flight' flight.id %}">Flight {{ flight.id }}: {{ flight.origin }} to {{ flight.destination }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
